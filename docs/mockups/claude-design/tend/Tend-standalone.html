<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Tend — between-visit care</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body {
    margin: 0;
    padding: 0;
    font-family: "Inter", system-ui, -apple-system, sans-serif;
    background: #f0eee9;
    color: #1a1715;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  * { box-sizing: border-box; }
  button { font-family: inherit; }

  .anno-pin {
    position: absolute;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: #fde047;
    color: #422006;
    border: 1.5px solid #92400e;
    font: 600 10px/1 "JetBrains Mono", monospace;
    display: flex; align-items: center; justify-content: center;
    cursor: help;
    z-index: 100;
    box-shadow: 0 2px 6px rgba(0,0,0,.18);
  }
  .anno-pin:hover { transform: scale(1.15); }
  .anno-tip {
    position: absolute;
    background: #1c1917;
    color: #fafaf9;
    padding: 8px 11px;
    border-radius: 6px;
    font-size: 11px;
    line-height: 1.4;
    max-width: 240px;
    z-index: 101;
    pointer-events: none;
    box-shadow: 0 8px 24px rgba(0,0,0,.3);
    font-weight: 400;
  }
  .anno-hidden .anno-pin { display: none; }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="env,react">

// DesignCanvas.jsx — Figma-ish design canvas wrapper
// Warm gray grid bg + Sections + Artboards + PostIt notes.
// Artboards are reorderable (grip-drag), labels/titles are inline-editable,
// and any artboard can be opened in a fullscreen focus overlay (←/→/Esc).
// State persists to a .design-canvas.state.json sidecar via the host
// bridge. No assets, no deps.
//
// Usage:
//   <DesignCanvas>
//     <DCSection id="onboarding" title="Onboarding" subtitle="First-run variants">
//       <DCArtboard id="a" label="A · Dusk" width={260} height={480}>…</DCArtboard>
//       <DCArtboard id="b" label="B · Minimal" width={260} height={480}>…</DCArtboard>
//     </DCSection>
//   </DesignCanvas>

const DC = {
  bg: '#f0eee9',
  grid: 'rgba(0,0,0,0.06)',
  label: 'rgba(60,50,40,0.7)',
  title: 'rgba(40,30,20,0.85)',
  subtitle: 'rgba(60,50,40,0.6)',
  postitBg: '#fef4a8',
  postitText: '#5a4a2a',
  font: '-apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif',
};

// One-time CSS injection (classes are dc-prefixed so they don't collide with
// the hosted design's own styles).
if (typeof document !== 'undefined' && !document.getElementById('dc-styles')) {
  const s = document.createElement('style');
  s.id = 'dc-styles';
  s.textContent = [
    '.dc-editable{cursor:text;outline:none;white-space:nowrap;border-radius:3px;padding:0 2px;margin:0 -2px}',
    '.dc-editable:focus{background:#fff;box-shadow:0 0 0 1.5px #c96442}',
    '[data-dc-slot]{transition:transform .18s cubic-bezier(.2,.7,.3,1)}',
    '[data-dc-slot].dc-dragging{transition:none;z-index:10;pointer-events:none}',
    '[data-dc-slot].dc-dragging .dc-card{box-shadow:0 12px 40px rgba(0,0,0,.25),0 0 0 2px #c96442;transform:scale(1.02)}',
    '.dc-card{transition:box-shadow .15s,transform .15s}',
    '.dc-card *{scrollbar-width:none}',
    '.dc-card *::-webkit-scrollbar{display:none}',
    '.dc-labelrow{display:flex;align-items:center;gap:4px;height:24px}',
    '.dc-grip{cursor:grab;display:flex;align-items:center;padding:5px 4px;border-radius:4px;transition:background .12s}',
    '.dc-grip:hover{background:rgba(0,0,0,.08)}',
    '.dc-grip:active{cursor:grabbing}',
    '.dc-labeltext{cursor:pointer;border-radius:4px;padding:3px 6px;display:flex;align-items:center;transition:background .12s}',
    '.dc-labeltext:hover{background:rgba(0,0,0,.05)}',
    '.dc-expand{position:absolute;bottom:100%;right:0;margin-bottom:5px;z-index:2;opacity:0;transition:opacity .12s,background .12s;',
    '  width:22px;height:22px;border-radius:5px;border:none;cursor:pointer;padding:0;',
    '  background:transparent;color:rgba(60,50,40,.7);display:flex;align-items:center;justify-content:center}',
    '.dc-expand:hover{background:rgba(0,0,0,.06);color:#2a251f}',
    '[data-dc-slot]:hover .dc-expand{opacity:1}',
  ].join('\n');
  document.head.appendChild(s);
}

const DCCtx = React.createContext(null);

// ─────────────────────────────────────────────────────────────
// DesignCanvas — stateful wrapper around the pan/zoom viewport.
// Owns runtime state (per-section order, renamed titles/labels, focused
// artboard). Order/titles/labels persist to a .design-canvas.state.json
// sidecar next to the HTML. Reads go via plain fetch() so the saved
// arrangement is visible anywhere the HTML + sidecar are served together
// (omelette preview, direct link, downloaded zip). Writes go through the
// host's window.omelette bridge — editing requires the omelette runtime.
// Focus is ephemeral.
// ─────────────────────────────────────────────────────────────
const DC_STATE_FILE = '.design-canvas.state.json';

function DesignCanvas({ children, minScale, maxScale, style }) {
  const [state, setState] = React.useState({ sections: {}, focus: null });
  // Hold rendering until the sidecar read settles so the saved order/titles
  // appear on first paint (no source-order flash). didRead gates writes until
  // the read settles so the empty initial state can't clobber a slow read;
  // skipNextWrite suppresses the one echo-write that would otherwise follow
  // hydration.
  const [ready, setReady] = React.useState(false);
  const didRead = React.useRef(false);
  const skipNextWrite = React.useRef(false);

  React.useEffect(() => {
    let off = false;
    fetch('./' + DC_STATE_FILE)
      .then((r) => (r.ok ? r.json() : null))
      .then((saved) => {
        if (off || !saved || !saved.sections) return;
        skipNextWrite.current = true;
        setState((s) => ({ ...s, sections: saved.sections }));
      })
      .catch(() => {})
      .finally(() => { didRead.current = true; if (!off) setReady(true); });
    const t = setTimeout(() => { if (!off) setReady(true); }, 150);
    return () => { off = true; clearTimeout(t); };
  }, []);

  React.useEffect(() => {
    if (!didRead.current) return;
    if (skipNextWrite.current) { skipNextWrite.current = false; return; }
    const t = setTimeout(() => {
      window.omelette?.writeFile(DC_STATE_FILE, JSON.stringify({ sections: state.sections })).catch(() => {});
    }, 250);
    return () => clearTimeout(t);
  }, [state.sections]);

  // Build registries synchronously from children so FocusOverlay can read
  // them in the same render. Only direct DCSection > DCArtboard children are
  // walked — wrapping them in other elements opts out of focus/reorder.
  const registry = {};     // slotId -> { sectionId, artboard }
  const sectionMeta = {};  // sectionId -> { title, subtitle, slotIds[] }
  const sectionOrder = [];
  React.Children.forEach(children, (sec) => {
    if (!sec || sec.type !== DCSection) return;
    const sid = sec.props.id ?? sec.props.title;
    if (!sid) return;
    sectionOrder.push(sid);
    const persisted = state.sections[sid] || {};
    const srcIds = [];
    React.Children.forEach(sec.props.children, (ab) => {
      if (!ab || ab.type !== DCArtboard) return;
      const aid = ab.props.id ?? ab.props.label;
      if (!aid) return;
      registry[`${sid}/${aid}`] = { sectionId: sid, artboard: ab };
      srcIds.push(aid);
    });
    const kept = (persisted.order || []).filter((k) => srcIds.includes(k));
    sectionMeta[sid] = {
      title: persisted.title ?? sec.props.title,
      subtitle: sec.props.subtitle,
      slotIds: [...kept, ...srcIds.filter((k) => !kept.includes(k))],
    };
  });

  const api = React.useMemo(() => ({
    state,
    section: (id) => state.sections[id] || {},
    patchSection: (id, p) => setState((s) => ({
      ...s,
      sections: { ...s.sections, [id]: { ...s.sections[id], ...(typeof p === 'function' ? p(s.sections[id] || {}) : p) } },
    })),
    setFocus: (slotId) => setState((s) => ({ ...s, focus: slotId })),
  }), [state]);

  // Esc exits focus; any outside pointerdown commits an in-progress rename.
  React.useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') api.setFocus(null); };
    const onPd = (e) => {
      const ae = document.activeElement;
      if (ae && ae.isContentEditable && !ae.contains(e.target)) ae.blur();
    };
    document.addEventListener('keydown', onKey);
    document.addEventListener('pointerdown', onPd, true);
    return () => {
      document.removeEventListener('keydown', onKey);
      document.removeEventListener('pointerdown', onPd, true);
    };
  }, [api]);

  return (
    <DCCtx.Provider value={api}>
      <DCViewport minScale={minScale} maxScale={maxScale} style={style}>{ready && children}</DCViewport>
      {state.focus && registry[state.focus] && (
        <DCFocusOverlay entry={registry[state.focus]} sectionMeta={sectionMeta} sectionOrder={sectionOrder} />
      )}
    </DCCtx.Provider>
  );
}

// ─────────────────────────────────────────────────────────────
// DCViewport — transform-based pan/zoom (internal)
//
// Input mapping (Figma-style):
//   • trackpad pinch  → zoom   (ctrlKey wheel; Safari gesture* events)
//   • trackpad scroll → pan    (two-finger)
//   • mouse wheel     → zoom   (notched; distinguished from trackpad scroll)
//   • middle-drag / primary-drag-on-bg → pan
//
// Transform state lives in a ref and is written straight to the DOM
// (translate3d + will-change) so wheel ticks don't go through React —
// keeps pans at 60fps on dense canvases.
// ─────────────────────────────────────────────────────────────
function DCViewport({ children, minScale = 0.1, maxScale = 8, style = {} }) {
  const vpRef = React.useRef(null);
  const worldRef = React.useRef(null);
  const tf = React.useRef({ x: 0, y: 0, scale: 1 });

  const apply = React.useCallback(() => {
    const { x, y, scale } = tf.current;
    const el = worldRef.current;
    if (el) el.style.transform = `translate3d(${x}px, ${y}px, 0) scale(${scale})`;
  }, []);

  React.useEffect(() => {
    const vp = vpRef.current;
    if (!vp) return;

    const zoomAt = (cx, cy, factor) => {
      const r = vp.getBoundingClientRect();
      const px = cx - r.left, py = cy - r.top;
      const t = tf.current;
      const next = Math.min(maxScale, Math.max(minScale, t.scale * factor));
      const k = next / t.scale;
      // keep the world point under the cursor fixed
      t.x = px - (px - t.x) * k;
      t.y = py - (py - t.y) * k;
      t.scale = next;
      apply();
    };

    // Mouse-wheel vs trackpad-scroll heuristic. A physical wheel sends
    // line-mode deltas (Firefox) or large integer pixel deltas with no X
    // component (Chrome/Safari, typically multiples of 100/120). Trackpad
    // two-finger scroll sends small/fractional pixel deltas, often with
    // non-zero deltaX. ctrlKey is set by the browser for trackpad pinch.
    const isMouseWheel = (e) =>
      e.deltaMode !== 0 ||
      (e.deltaX === 0 && Number.isInteger(e.deltaY) && Math.abs(e.deltaY) >= 40);

    const onWheel = (e) => {
      e.preventDefault();
      if (isGesturing) return; // Safari: gesture* owns the pinch — discard concurrent wheels
      if (e.ctrlKey) {
        // trackpad pinch (or explicit ctrl+wheel)
        zoomAt(e.clientX, e.clientY, Math.exp(-e.deltaY * 0.01));
      } else if (isMouseWheel(e)) {
        // notched mouse wheel — fixed-ratio step per click
        zoomAt(e.clientX, e.clientY, Math.exp(-Math.sign(e.deltaY) * 0.18));
      } else {
        // trackpad two-finger scroll — pan
        tf.current.x -= e.deltaX;
        tf.current.y -= e.deltaY;
        apply();
      }
    };

    // Safari sends native gesture* events for trackpad pinch with a smooth
    // e.scale; preferring these over the ctrl+wheel fallback gives a much
    // better feel there. No-ops on other browsers. Safari also fires
    // ctrlKey wheel events during the same pinch — isGesturing makes
    // onWheel drop those entirely so they neither zoom nor pan.
    let gsBase = 1;
    let isGesturing = false;
    const onGestureStart = (e) => { e.preventDefault(); isGesturing = true; gsBase = tf.current.scale; };
    const onGestureChange = (e) => {
      e.preventDefault();
      zoomAt(e.clientX, e.clientY, (gsBase * e.scale) / tf.current.scale);
    };
    const onGestureEnd = (e) => { e.preventDefault(); isGesturing = false; };

    // Drag-pan: middle button anywhere, or primary button on canvas
    // background (anything that isn't an artboard or an inline editor).
    let drag = null;
    const onPointerDown = (e) => {
      const onBg = !e.target.closest('[data-dc-slot], .dc-editable');
      if (!(e.button === 1 || (e.button === 0 && onBg))) return;
      e.preventDefault();
      vp.setPointerCapture(e.pointerId);
      drag = { id: e.pointerId, lx: e.clientX, ly: e.clientY };
      vp.style.cursor = 'grabbing';
    };
    const onPointerMove = (e) => {
      if (!drag || e.pointerId !== drag.id) return;
      tf.current.x += e.clientX - drag.lx;
      tf.current.y += e.clientY - drag.ly;
      drag.lx = e.clientX; drag.ly = e.clientY;
      apply();
    };
    const onPointerUp = (e) => {
      if (!drag || e.pointerId !== drag.id) return;
      vp.releasePointerCapture(e.pointerId);
      drag = null;
      vp.style.cursor = '';
    };

    vp.addEventListener('wheel', onWheel, { passive: false });
    vp.addEventListener('gesturestart', onGestureStart, { passive: false });
    vp.addEventListener('gesturechange', onGestureChange, { passive: false });
    vp.addEventListener('gestureend', onGestureEnd, { passive: false });
    vp.addEventListener('pointerdown', onPointerDown);
    vp.addEventListener('pointermove', onPointerMove);
    vp.addEventListener('pointerup', onPointerUp);
    vp.addEventListener('pointercancel', onPointerUp);
    return () => {
      vp.removeEventListener('wheel', onWheel);
      vp.removeEventListener('gesturestart', onGestureStart);
      vp.removeEventListener('gesturechange', onGestureChange);
      vp.removeEventListener('gestureend', onGestureEnd);
      vp.removeEventListener('pointerdown', onPointerDown);
      vp.removeEventListener('pointermove', onPointerMove);
      vp.removeEventListener('pointerup', onPointerUp);
      vp.removeEventListener('pointercancel', onPointerUp);
    };
  }, [apply, minScale, maxScale]);

  const gridSvg = `url("data:image/svg+xml,%3Csvg width='120' height='120' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M120 0H0v120' fill='none' stroke='${encodeURIComponent(DC.grid)}' stroke-width='1'/%3E%3C/svg%3E")`;
  return (
    <div
      ref={vpRef}
      className="design-canvas"
      style={{
        height: '100vh', width: '100vw',
        background: DC.bg,
        overflow: 'hidden',
        overscrollBehavior: 'none',
        touchAction: 'none',
        position: 'relative',
        fontFamily: DC.font,
        boxSizing: 'border-box',
        ...style,
      }}
    >
      <div
        ref={worldRef}
        style={{
          position: 'absolute', top: 0, left: 0,
          transformOrigin: '0 0',
          willChange: 'transform',
          width: 'max-content', minWidth: '100%',
          minHeight: '100%',
          padding: '60px 0 80px',
        }}
      >
        <div style={{ position: 'absolute', inset: -6000, backgroundImage: gridSvg, backgroundSize: '120px 120px', pointerEvents: 'none', zIndex: -1 }} />
        {children}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// DCSection — editable title + h-row of artboards in persisted order
// ─────────────────────────────────────────────────────────────
function DCSection({ id, title, subtitle, children, gap = 48 }) {
  const ctx = React.useContext(DCCtx);
  const sid = id ?? title;
  const all = React.Children.toArray(children);
  const artboards = all.filter((c) => c && c.type === DCArtboard);
  const rest = all.filter((c) => !(c && c.type === DCArtboard));
  const srcOrder = artboards.map((a) => a.props.id ?? a.props.label);
  const sec = (ctx && sid && ctx.section(sid)) || {};

  const order = React.useMemo(() => {
    const kept = (sec.order || []).filter((k) => srcOrder.includes(k));
    return [...kept, ...srcOrder.filter((k) => !kept.includes(k))];
  }, [sec.order, srcOrder.join('|')]);

  const byId = Object.fromEntries(artboards.map((a) => [a.props.id ?? a.props.label, a]));

  return (
    <div data-dc-section={sid} style={{ marginBottom: 80, position: 'relative' }}>
      <div style={{ padding: '0 60px 56px' }}>
        <DCEditable tag="div" value={sec.title ?? title}
          onChange={(v) => ctx && sid && ctx.patchSection(sid, { title: v })}
          style={{ fontSize: 28, fontWeight: 600, color: DC.title, letterSpacing: -0.4, marginBottom: 6, display: 'inline-block' }} />
        {subtitle && <div style={{ fontSize: 16, color: DC.subtitle }}>{subtitle}</div>}
      </div>
      <div style={{ display: 'flex', gap, padding: '0 60px', alignItems: 'flex-start', width: 'max-content' }}>
        {order.map((k) => (
          <DCArtboardFrame key={k} sectionId={sid} artboard={byId[k]} order={order}
            label={(sec.labels || {})[k] ?? byId[k].props.label}
            onRename={(v) => ctx && ctx.patchSection(sid, (x) => ({ labels: { ...x.labels, [k]: v } }))}
            onReorder={(next) => ctx && ctx.patchSection(sid, { order: next })}
            onFocus={() => ctx && ctx.setFocus(`${sid}/${k}`)} />
        ))}
      </div>
      {rest}
    </div>
  );
}

// DCArtboard — marker; rendered by DCArtboardFrame via DCSection.
function DCArtboard() { return null; }

function DCArtboardFrame({ sectionId, artboard, label, order, onRename, onReorder, onFocus }) {
  const { id: rawId, label: rawLabel, width = 260, height = 480, children, style = {} } = artboard.props;
  const id = rawId ?? rawLabel;
  const ref = React.useRef(null);

  // Live drag-reorder: dragged card sticks to cursor; siblings slide into
  // their would-be slots in real time via transforms. DOM order only
  // changes on drop.
  const onGripDown = (e) => {
    e.preventDefault(); e.stopPropagation();
    const me = ref.current;
    // translateX is applied in local (pre-scale) space but pointer deltas and
    // getBoundingClientRect().left are screen-space — divide by the viewport's
    // current scale so the dragged card tracks the cursor at any zoom level.
    const scale = me.getBoundingClientRect().width / me.offsetWidth || 1;
    const peers = Array.from(document.querySelectorAll(`[data-dc-section="${sectionId}"] [data-dc-slot]`));
    const homes = peers.map((el) => ({ el, id: el.dataset.dcSlot, x: el.getBoundingClientRect().left }));
    const slotXs = homes.map((h) => h.x);
    const startIdx = order.indexOf(id);
    const startX = e.clientX;
    let liveOrder = order.slice();
    me.classList.add('dc-dragging');

    const layout = () => {
      for (const h of homes) {
        if (h.id === id) continue;
        const slot = liveOrder.indexOf(h.id);
        h.el.style.transform = `translateX(${(slotXs[slot] - h.x) / scale}px)`;
      }
    };

    const move = (ev) => {
      const dx = ev.clientX - startX;
      me.style.transform = `translateX(${dx / scale}px)`;
      const cur = homes[startIdx].x + dx;
      let nearest = 0, best = Infinity;
      for (let i = 0; i < slotXs.length; i++) {
        const d = Math.abs(slotXs[i] - cur);
        if (d < best) { best = d; nearest = i; }
      }
      if (liveOrder.indexOf(id) !== nearest) {
        liveOrder = order.filter((k) => k !== id);
        liveOrder.splice(nearest, 0, id);
        layout();
      }
    };

    const up = () => {
      document.removeEventListener('pointermove', move);
      document.removeEventListener('pointerup', up);
      const finalSlot = liveOrder.indexOf(id);
      me.classList.remove('dc-dragging');
      me.style.transform = `translateX(${(slotXs[finalSlot] - homes[startIdx].x) / scale}px)`;
      // After the settle transition, kill transitions + clear transforms +
      // commit the reorder in the same frame so there's no visual snap-back.
      setTimeout(() => {
        for (const h of homes) { h.el.style.transition = 'none'; h.el.style.transform = ''; }
        if (liveOrder.join('|') !== order.join('|')) onReorder(liveOrder);
        requestAnimationFrame(() => requestAnimationFrame(() => {
          for (const h of homes) h.el.style.transition = '';
        }));
      }, 180);
    };
    document.addEventListener('pointermove', move);
    document.addEventListener('pointerup', up);
  };

  return (
    <div ref={ref} data-dc-slot={id} style={{ position: 'relative', flexShrink: 0 }}>
      <div className="dc-labelrow" style={{ position: 'absolute', bottom: '100%', left: -4, marginBottom: 4, color: DC.label }}>
        <div className="dc-grip" onPointerDown={onGripDown} title="Drag to reorder">
          <svg width="9" height="13" viewBox="0 0 9 13" fill="currentColor"><circle cx="2" cy="2" r="1.1"/><circle cx="7" cy="2" r="1.1"/><circle cx="2" cy="6.5" r="1.1"/><circle cx="7" cy="6.5" r="1.1"/><circle cx="2" cy="11" r="1.1"/><circle cx="7" cy="11" r="1.1"/></svg>
        </div>
        <div className="dc-labeltext" onClick={onFocus} title="Click to focus">
          <DCEditable value={label} onChange={onRename} onClick={(e) => e.stopPropagation()}
            style={{ fontSize: 15, fontWeight: 500, color: DC.label, lineHeight: 1 }} />
        </div>
      </div>
      <button className="dc-expand" onClick={onFocus} onPointerDown={(e) => e.stopPropagation()} title="Focus">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"><path d="M7 1h4v4M5 11H1V7M11 1L7.5 4.5M1 11l3.5-3.5"/></svg>
      </button>
      <div className="dc-card"
        style={{ borderRadius: 2, boxShadow: '0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06)', overflow: 'hidden', width, height, background: '#fff', ...style }}>
        {children || <div style={{ height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#bbb', fontSize: 13, fontFamily: DC.font }}>{id}</div>}
      </div>
    </div>
  );
}

// Inline rename — commits on blur or Enter.
function DCEditable({ value, onChange, style, tag = 'span', onClick }) {
  const T = tag;
  return (
    <T className="dc-editable" contentEditable suppressContentEditableWarning
      onClick={onClick}
      onPointerDown={(e) => e.stopPropagation()}
      onBlur={(e) => onChange && onChange(e.currentTarget.textContent)}
      onKeyDown={(e) => { if (e.key === 'Enter') { e.preventDefault(); e.currentTarget.blur(); } }}
      style={style}>{value}</T>
  );
}

// ─────────────────────────────────────────────────────────────
// Focus mode — overlay one artboard; ←/→ within section, ↑/↓ across
// sections, Esc or backdrop click to exit.
// ─────────────────────────────────────────────────────────────
function DCFocusOverlay({ entry, sectionMeta, sectionOrder }) {
  const ctx = React.useContext(DCCtx);
  const { sectionId, artboard } = entry;
  const sec = ctx.section(sectionId);
  const meta = sectionMeta[sectionId];
  const peers = meta.slotIds;
  const aid = artboard.props.id ?? artboard.props.label;
  const idx = peers.indexOf(aid);
  const secIdx = sectionOrder.indexOf(sectionId);

  const go = (d) => { const n = peers[(idx + d + peers.length) % peers.length]; if (n) ctx.setFocus(`${sectionId}/${n}`); };
  const goSection = (d) => {
    const ns = sectionOrder[(secIdx + d + sectionOrder.length) % sectionOrder.length];
    const first = sectionMeta[ns] && sectionMeta[ns].slotIds[0];
    if (first) ctx.setFocus(`${ns}/${first}`);
  };

  React.useEffect(() => {
    const k = (e) => {
      if (e.key === 'ArrowLeft') { e.preventDefault(); go(-1); }
      if (e.key === 'ArrowRight') { e.preventDefault(); go(1); }
      if (e.key === 'ArrowUp') { e.preventDefault(); goSection(-1); }
      if (e.key === 'ArrowDown') { e.preventDefault(); goSection(1); }
    };
    document.addEventListener('keydown', k);
    return () => document.removeEventListener('keydown', k);
  });

  const { width = 260, height = 480, children } = artboard.props;
  const [vp, setVp] = React.useState({ w: window.innerWidth, h: window.innerHeight });
  React.useEffect(() => { const r = () => setVp({ w: window.innerWidth, h: window.innerHeight }); window.addEventListener('resize', r); return () => window.removeEventListener('resize', r); }, []);
  const scale = Math.max(0.1, Math.min((vp.w - 200) / width, (vp.h - 260) / height, 2));

  const [ddOpen, setDd] = React.useState(false);
  const Arrow = ({ dir, onClick }) => (
    <button onClick={(e) => { e.stopPropagation(); onClick(); }}
      style={{ position: 'absolute', top: '50%', [dir]: 28, transform: 'translateY(-50%)',
        border: 'none', background: 'rgba(255,255,255,.08)', color: 'rgba(255,255,255,.9)',
        width: 44, height: 44, borderRadius: 22, fontSize: 18, cursor: 'pointer',
        display: 'flex', alignItems: 'center', justifyContent: 'center', transition: 'background .15s' }}
      onMouseEnter={(e) => (e.currentTarget.style.background = 'rgba(255,255,255,.18)')}
      onMouseLeave={(e) => (e.currentTarget.style.background = 'rgba(255,255,255,.08)')}>
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
        <path d={dir === 'left' ? 'M11 3L5 9l6 6' : 'M7 3l6 6-6 6'} /></svg>
    </button>
  );

  // Portal to body so position:fixed is the real viewport regardless of any
  // transform on DesignCanvas's ancestors (including the canvas zoom itself).
  return ReactDOM.createPortal(
    <div onClick={() => ctx.setFocus(null)}
      onWheel={(e) => e.preventDefault()}
      style={{ position: 'fixed', inset: 0, zIndex: 100, background: 'rgba(24,20,16,.6)', backdropFilter: 'blur(14px)',
        fontFamily: DC.font, color: '#fff' }}>

      {/* top bar: section dropdown (left) · close (right) */}
      <div onClick={(e) => e.stopPropagation()}
        style={{ position: 'absolute', top: 0, left: 0, right: 0, height: 72, display: 'flex', alignItems: 'flex-start', padding: '16px 20px 0', gap: 16 }}>
        <div style={{ position: 'relative' }}>
          <button onClick={() => setDd((o) => !o)}
            style={{ border: 'none', background: 'transparent', color: '#fff', cursor: 'pointer', padding: '6px 8px',
              borderRadius: 6, textAlign: 'left', fontFamily: 'inherit' }}>
            <span style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <span style={{ fontSize: 18, fontWeight: 600, letterSpacing: -0.3 }}>{meta.title}</span>
              <svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" style={{ opacity: .7 }}><path d="M2 4l3.5 3.5L9 4"/></svg>
            </span>
            {meta.subtitle && <span style={{ display: 'block', fontSize: 13, opacity: .6, fontWeight: 400, marginTop: 2 }}>{meta.subtitle}</span>}
          </button>
          {ddOpen && (
            <div style={{ position: 'absolute', top: '100%', left: 0, marginTop: 4, background: '#2a251f', borderRadius: 8,
              boxShadow: '0 8px 32px rgba(0,0,0,.4)', padding: 4, minWidth: 200, zIndex: 10 }}>
              {sectionOrder.map((sid) => (
                <button key={sid} onClick={() => { setDd(false); const f = sectionMeta[sid].slotIds[0]; if (f) ctx.setFocus(`${sid}/${f}`); }}
                  style={{ display: 'block', width: '100%', textAlign: 'left', border: 'none', cursor: 'pointer',
                    background: sid === sectionId ? 'rgba(255,255,255,.1)' : 'transparent', color: '#fff',
                    padding: '8px 12px', borderRadius: 5, fontSize: 14, fontWeight: sid === sectionId ? 600 : 400, fontFamily: 'inherit' }}>
                  {sectionMeta[sid].title}
                </button>
              ))}
            </div>
          )}
        </div>
        <div style={{ flex: 1 }} />
        <button onClick={() => ctx.setFocus(null)}
          onMouseEnter={(e) => (e.currentTarget.style.background = 'rgba(255,255,255,.12)')}
          onMouseLeave={(e) => (e.currentTarget.style.background = 'transparent')}
          style={{ border: 'none', background: 'transparent', color: 'rgba(255,255,255,.7)', width: 32, height: 32,
            borderRadius: 16, fontSize: 20, cursor: 'pointer', lineHeight: 1, transition: 'background .12s' }}>×</button>
      </div>

      {/* card centered, label + index below — only the card itself stops
          propagation so any backdrop click (including the margins around
          the card) exits focus */}
      <div
        style={{ position: 'absolute', top: 64, bottom: 56, left: 100, right: 100, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 16 }}>
        <div onClick={(e) => e.stopPropagation()} style={{ width: width * scale, height: height * scale, position: 'relative' }}>
          <div style={{ width, height, transform: `scale(${scale})`, transformOrigin: 'top left', background: '#fff', borderRadius: 2, overflow: 'hidden',
            boxShadow: '0 20px 80px rgba(0,0,0,.4)' }}>
            {children || <div style={{ height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#bbb' }}>{aid}</div>}
          </div>
        </div>
        <div onClick={(e) => e.stopPropagation()} style={{ fontSize: 14, fontWeight: 500, opacity: .85, textAlign: 'center' }}>
          {(sec.labels || {})[aid] ?? artboard.props.label}
          <span style={{ opacity: .5, marginLeft: 10, fontVariantNumeric: 'tabular-nums' }}>{idx + 1} / {peers.length}</span>
        </div>
      </div>

      <Arrow dir="left" onClick={() => go(-1)} />
      <Arrow dir="right" onClick={() => go(1)} />

      {/* dots */}
      <div onClick={(e) => e.stopPropagation()}
        style={{ position: 'absolute', bottom: 20, left: '50%', transform: 'translateX(-50%)', display: 'flex', gap: 8 }}>
        {peers.map((p, i) => (
          <button key={p} onClick={() => ctx.setFocus(`${sectionId}/${p}`)}
            style={{ border: 'none', padding: 0, cursor: 'pointer', width: 6, height: 6, borderRadius: 3,
              background: i === idx ? '#fff' : 'rgba(255,255,255,.3)' }} />
        ))}
      </div>
    </div>,
    document.body,
  );
}

// ─────────────────────────────────────────────────────────────
// Post-it — absolute-positioned sticky note
// ─────────────────────────────────────────────────────────────
function DCPostIt({ children, top, left, right, bottom, rotate = -2, width = 180 }) {
  return (
    <div style={{
      position: 'absolute', top, left, right, bottom, width,
      background: DC.postitBg, padding: '14px 16px',
      fontFamily: '"Comic Sans MS", "Marker Felt", "Segoe Print", cursive',
      fontSize: 14, lineHeight: 1.4, color: DC.postitText,
      boxShadow: '0 2px 8px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.08)',
      transform: `rotate(${rotate}deg)`,
      zIndex: 5,
    }}>{children}</div>
  );
}

Object.assign(window, { DesignCanvas, DCSection, DCArtboard, DCPostIt });

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>

<script type="text/babel" data-presets="env,react">
// Tiny annotation pin component. Toggled globally via window.__TEND_ANNOTATIONS.
// Use: <Anno n={1} top={12} left={20}>This explains the design choice…</Anno>

function Anno({ n, top, left, right, bottom, children, side = 'right' }) {
  const [open, setOpen] = React.useState(false);
  const visible = window.__TEND_ANNOTATIONS;

  // re-render when global flips
  const [, force] = React.useReducer(x => x + 1, 0);
  React.useEffect(() => {
    const h = () => force();
    window.addEventListener('tend-anno-toggle', h);
    return () => window.removeEventListener('tend-anno-toggle', h);
  }, []);

  if (!visible) return null;

  const pos = {};
  if (top != null) pos.top = top;
  if (left != null) pos.left = left;
  if (right != null) pos.right = right;
  if (bottom != null) pos.bottom = bottom;

  const tipPos = side === 'right'
    ? { left: 26, top: -4 }
    : side === 'left'
    ? { right: 26, top: -4 }
    : side === 'top'
    ? { left: -8, bottom: 26 }
    : { left: -8, top: 26 };

  return (
    <div style={{ position:'absolute', ...pos, zIndex: 50 }}
         onMouseEnter={() => setOpen(true)}
         onMouseLeave={() => setOpen(false)}>
      <div className="anno-pin">{n}</div>
      {open && (
        <div className="anno-tip" style={{ position:'absolute', ...tipPos }}>
          {children}
        </div>
      )}
    </div>
  );
}

window.Anno = Anno;

</script>

function Dashboard({ filter, setFilter, onPatient, adherenceMode }) {
  const overrides = {
    on: { adherence: 92, status: 'on-track', summary: 'All exposures complete this week. Sleep stable 6.4h avg. Mood trending up.', flag: null, trend:'up' },
    off:{ adherence: 41, status: 'attention', summary: 'Skipped all in-vivo exposures this week. Sleep <4h on 4 nights. Two episodes.', flag:'No journal entries 3d. Two episodes shared. Imaginal exposure declined.', trend:'down' },
  };

  const patients = PATIENTS.map(p => {
    if (p.id === 'chen' && (adherenceMode === 'on' || adherenceMode === 'off')) {
      return { ...p, ...overrides[adherenceMode] };
    }
    return p;
  });

  const filtered = patients.filter(p =>
    filter === 'all' ? true :
    filter === 'attention' ? p.status === 'attention' :
    filter === 'pre-session' ? ['chen','noa','tamar'].includes(p.id) :
    filter === 'no-engagement' ? (p.id === 'lior') :
    true
  );

  const counts = {
    all: patients.length,
    attention: patients.filter(p => p.status === 'attention').length,
    'pre-session': 3,
    'no-engagement': 1,
  };

  return (
    <div style={{ padding:'18px 22px 28px', position:'relative' }}>
      <Anno n={1} top={20} left={-22}>
        <strong>Pull-first dashboard.</strong> No notification firehose — patients surface only when their prescription deviation crosses the threshold the clinician defined.
      </Anno>

      {/* Top metrics */}
      <div style={{ display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap:12, marginBottom:18 }}>
        <Stat label="Active patients" value="8" sub="2 added this month" />
        <Stat label="Need attention" value={counts.attention} sub="Adherence drift" tone="warn" />
        <Stat label="This week's sessions" value="11" sub="3 today" />
        <Stat label="Avg adherence" value="72%" sub="+4 vs last week" tone="ok" trend="up" />
      </div>

      {/* Filters */}
      <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:14, flexWrap:'wrap' }}>
        <span style={{ fontSize:11, color:C.faint, fontWeight:600, letterSpacing:'.06em', textTransform:'uppercase', marginRight:6 }}>Smart filters</span>
        {[
          ['all','All'],
          ['attention','Needs attention'],
          ['pre-session','Session in 24h'],
          ['no-engagement','No engagement 72h'],
        ].map(([k, label]) => (
          <button key={k} onClick={() => setFilter(k)} style={{
            padding:'4px 10px', borderRadius:999, fontSize:11.5, fontWeight:500,
            border:`.5px solid ${filter===k ? C.fg : C.border}`,
            background: filter===k ? C.fg : '#fff',
            color: filter===k ? '#fff' : C.fg,
            cursor:'pointer', display:'inline-flex', alignItems:'center', gap:6,
          }}>
            {label}
            <span style={{ fontSize:10, opacity:.7 }}>{counts[k]}</span>
          </button>
        ))}
      </div>

      {/* Patient list */}
      <div style={{
        background:'#fff', border:`.5px solid ${C.border}`, borderRadius:10,
        overflow:'hidden', position:'relative',
      }}>
        <div style={{
          display:'grid',
          gridTemplateColumns:'minmax(200px,1.4fr) 90px minmax(140px,1.1fr) minmax(220px,2fr) 110px 30px',
          gap:14, padding:'9px 16px', borderBottom:`.5px solid ${C.border}`,
          fontSize:10, fontWeight:600, letterSpacing:'.06em', textTransform:'uppercase',
          color:C.faint, background:'#fafafa',
        }}>
          <div>Patient</div>
          <div>Condition</div>
          <div>Adherence (14d)</div>
          <div>Latest signal</div>
          <div>Next session</div>
          <div></div>
        </div>
        {filtered.map(p => (
          <PatientRow key={p.id} p={p} onClick={p.id==='chen' ? onPatient : undefined} />

        {filtered.length === 0 && (
          <div style={{ padding:'40px 16px', textAlign:'center', color:C.faint, fontSize:12 }}>

function Stat({ label, value, sub, tone='neutral', trend }) {

  return (
    <div>
      <div style={{ display:'flex', gap:14, marginBottom:14 }}>
        <Mini label="Composite (14d)" value={adherenceMode==='on'?'92%':adherenceMode==='off'?'41%':'64%'} tone={adherenceMode==='on'?'ok':adherenceMode==='off'?'warn':'neutral'} />
        <Mini label="Streak — morning log" value={adherenceMode==='off'?'0d':'5d'} />
        <Mini label="Last in-vivo" value={adherenceMode==='off'?'Apr 25':'Apr 30'} />
        <Mini label="Sleep avg (7d)" value={adherenceMode==='on'?'6.4h':adherenceMode==='off'?'3.8h':'4.2h'} tone={adherenceMode==='on'?'ok':'warn'} />
      </div>

      <Card title="14-day prescription heatmap" right={<Legend />}>
        <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
          {/* Header dates */}
          <div style={{ display:'grid', gridTemplateColumns:`200px repeat(14, 1fr)`, gap:4, alignItems:'end' }}>
            <div />
            {ADHERENCE_14D.days.map((d, i) => (
              <div key={i} style={{ fontSize:9.5, color:C.faint, textAlign:'center', fontFamily:C.mono }}>
                {d.split(' ')[1]}
              </div>
            ))}
          </div>
          {rows.map((r, i) => (
            <div key={i} style={{ display:'grid', gridTemplateColumns:`200px repeat(14, 1fr)`, gap:4, alignItems:'center' }}>
              <div style={{ fontSize:12 }}>{r.task}</div>
              {r.values.map((v, j) => (
                <Cell key={j} v={v} />
              ))}
            </div>
          ))}
        </div>
      </Card>

      <Anno n={3} top={20} right={20}>
        <strong>Adherence view, two depths.</strong> Composite numbers up top for the glance; the heatmap below for clinicians who want per-task / per-day detail. Patient controls how much detail each layer reveals.
      </Anno>
    </div>
  );
}

function Cell({ v }) {
  if (v == null) return <div style={{ height:24, background:'transparent', borderRadius:4 }} />;
  const c = v === 1 ? C.ok : v === 0.5 ? '#e0a45c' : C.bad;
  const bg = v === 1 ? 'rgba(5,150,105,.18)' : v === 0.5 ? 'rgba(224,164,92,.22)' : 'rgba(185,28,28,.16)';
  return (
    <div style={{
      height:24, background:bg, borderRadius:4, position:'relative',
      display:'flex', alignItems:'center', justifyContent:'center',
    }}>
      <div style={{ width:6, height:6, borderRadius:'50%', background:c }} />
    </div>
  );
}

function Legend() {
  return (
    <div style={{ display:'flex', gap:10, fontSize:10.5, color:C.muted }}>
      {[['Done',C.ok],['Partial','#e0a45c'],['Missed',C.bad]].map(([l, c]) => (
        <span key={l} style={{ display:'inline-flex', alignItems:'center', gap:4 }}>
          <span style={{ width:7, height:7, borderRadius:'50%', background:c }} />{l}

}

// ────── Shares from Chen ──────

      <Card title={`Shared by Chen · last 7 days (${SHARED_LOG.length})`}>

function ConversationsTab() {
  return (
    <div style={{ maxWidth:760 }}>
      <div style={{ marginBottom:12, fontSize:12.5, color:C.muted, lineHeight:1.55 }}>
        Conversations live on Chen's device. He chooses to share <b>themes and summaries</b> here — never raw transcripts unless he opts in.
      </div>
      <Card title="Themes Chen surfaced this week">
        {[
          ['Avoidance of public spaces','3 mentions','Especially mid-morning, places that "feel exposed"'],

                <span style={{ fontSize:13, fontWeight:500 }}>{title}</span>

function ContextTab() {
  return (

      <Anno n={5} top={-4} right={0} side="bottom">
        <strong>Context flows the other way too.</strong> This is the explicit surface for what the clinician shared <em>down</em> to Chen's device — for personalization. Symmetric to the share-up flow.

      <div style={{ marginBottom:12, fontSize:12.5, color:C.muted, lineHeight:1.55 }}>
        What you've shared <em>down</em> to Chen's app. The on-device Maya uses only this — nothing else.
      </div>
      <Card title="Persona settings">
        <Row label="Persona name" value="Maya" />
        <Row label="Tone" value="Warm-direct (your default)" />
        <Row label="Voice modeling" value="Off (Chen has not opted in)" />
        <Row label="Allowed scope" value="Prescription guidance, grounding, in-the-moment de-escalation" />
        <Row label="Out of scope" value="Trauma processing, medication advice, crisis (hands off to human)" last />
      </Card>
      <div style={{ height:14 }} />
      <Card title="Patient context shared with the on-device AI" right={<button style={{ padding:'4px 10px', fontSize:11, border:`.5px solid ${C.border}`, background:'#fff', borderRadius:6, cursor:'pointer' }}>+ Share more</button>}>
        <Row label="Diagnosis & phase" value="PTSD · Phase 2 processing" />
        <Row label="Trigger themes" value="Crowded indoor spaces, sudden loud sounds, scent of diesel" />
        <Row label="Grounding preferences" value="3-2-1 sensory; cold water; declined breathwork" />
        <Row label="Recent session highlights" value="2 paragraphs from Apr 28 session notes" />
        <Row label="Withheld" value="Full session transcripts, diagnostic history, family details" tone="warn" last />

}

function Row({ label, value, tone='neutral', last }) {
  return (
    <div style={{
      display:'grid', gridTemplateColumns:'180px 1fr', gap:14, padding:'10px 0',
      borderBottom: last ? 'none' : `.5px solid ${C.border}`,

    }}>
      <div style={{ fontSize:11.5, color:C.faint, fontWeight:500 }}>{label}</div>

    </div>
  );
}

window.ClinicianApp = ClinicianApp;

<script type="text/babel" data-presets="env,react">
// Prescription authoring + Shares inbox + Context flow
// Continues the clinician app namespace.

function PrescriptionAuthoring({ onBack }) {
  const [step, setStep] = React.useState(1);
  // 1: upload notes, 2: AI draft + edit, 3: review & approve
  const [notes, setNotes] = React.useState(SAMPLE_SESSION_NOTES);
  const [draft, setDraft] = React.useState(null);
  const [thinking, setThinking] = React.useState(false);

  const generate = () => {
    setThinking(true);
    setTimeout(() => {
      setDraft(JSON.parse(JSON.stringify(AI_DRAFT)));
      setThinking(false);
      setStep(2);
    }, 1200);
  };

  return (
    <div style={{ padding:'18px 22px 28px', position:'relative' }}>
      <Anno n={1} top={20} right={20}>
        <strong>AI drafts, clinician approves.</strong> The prescription is the contract for everything between visits. Maya can upload her own notes, accept the draft, edit any task, then sign off. Final approval is always hers.
      </Anno>

      <Stepper step={step} steps={['Session notes','AI draft & edit','Review & approve']} />

      <div style={{ marginTop:18 }}>
        {step === 1 && (
          <UploadStep notes={notes} setNotes={setNotes} onGenerate={generate} thinking={thinking} />
        )}
        {step === 2 && draft && (
          <DraftStep draft={draft} setDraft={setDraft} onBack={() => setStep(1)} onNext={() => setStep(3)} />
        )}
        {step === 3 && draft && (
          <ApproveStep draft={draft} onBack={() => setStep(2)} onApprove={onBack} />
        )}
      </div>
    </div>
  );
}

function Stepper({ step, steps }) {
  return (
    <div style={{ display:'flex', alignItems:'center', gap:12 }}>
      {steps.map((label, i) => {
        const n = i + 1;
        const active = step === n;
        const done = step > n;
        return (
          <React.Fragment key={i}>
            <div style={{ display:'flex', alignItems:'center', gap:8 }}>
              <div style={{
                width:22, height:22, borderRadius:'50%',
                background: done ? C.accent : active ? '#fff' : '#f1f5f9',
                color: done ? '#fff' : active ? C.fg : C.faint,
                border: active ? `1.5px solid ${C.accent}` : `.5px solid ${C.border}`,
                display:'flex', alignItems:'center', justifyContent:'center',
                fontSize:11, fontWeight:600,
              }}>{done ? I.check(11) : n}</div>
              <span style={{ fontSize:12.5, fontWeight: active||done ? 600 : 500, color: active||done ? C.fg : C.muted }}>
                {label}
              </span>
            </div>
            {i < steps.length - 1 && (
              <div style={{ flex:'0 0 40px', height:1, background:done?C.accent:C.border }} />
            )}
          </React.Fragment>
        );
      })}
    </div>
  );
}

const SAMPLE_SESSION_NOTES = `Session 11 · Chen Avraham · Apr 28, 2026

Presentation: Reports 3 nightmares this week, woke 02:00–03:00 each time. Used 3-2-1 grounding twice (effective once). Avoiding Café Albert; said it "felt impossible Mon."

Work in session:
- Reviewed last imaginal exposure recording. SUDS peaked at 8, ended at 5. Patient noted decreased dissociation compared to two weeks ago.
- Discussed in-vivo step. Chen wants to scale back from "crowded mid-morning" to "near-empty late afternoon" for now.
- Sleep: still no consistent window. Drinking 4 coffees most days. Agreed cut-off 14:00.

Plan:
- Continue PE imaginal recording 4×/week.
- In-vivo café: scale to late afternoon Mon/Thu, 20 min, stay until SUDS halves.
- Sleep window 23:30–06:30; phone out of room.
- Morning grounding + 1-line log daily.
- Cut caffeine after 14:00.
- Maya (AI) may guide grounding and exposure. No trauma processing. Crisis → human protocol.
- Notify if SUDS sustained ≥8 for >30min during exposure, or two consecutive nights <4h sleep.

Risk: No SI ideation reported. Patient denied passive thoughts. Continue weekly check on this.`;

const AI_DRAFT = {
  protocol: 'Prolonged Exposure + sleep stabilization',
  tasks: [
    { id:'imag-exp', title:'Imaginal exposure recording', cadence:'4× / week', duration:'~30 min', detail:'Listen to recorded narrative. SUDS log before/after. Maya can guide if SUDS ≥7.', type:'exposure', source:'session-notes' },
    { id:'in-vivo', title:'In-vivo exposure: Café Albert', cadence:'Mon, Thu', duration:'20 min', detail:'Late afternoon (scaled down). Stay until SUDS drops by 50%.', type:'exposure', source:'session-notes' },
    { id:'sleep', title:'Sleep window 23:30 – 06:30', cadence:'nightly', duration:'7h', detail:'No screens after 22:30. Phone out of room. If awake >20 min, get out of bed.', type:'continuous', source:'session-notes' },
    { id:'journal', title:'Morning grounding + log', cadence:'daily', duration:'5 min', detail:'3-2-1 grounding, then one line on last night.', type:'continuous', source:'session-notes' },
  ],
  constraints: [
    { id:'c1', text:'No alcohol while in active PE phase', source:'standing' },
    { id:'c2', text:'Caffeine cut-off 14:00', source:'session-notes' },
  ],
  escalation: [
    { id:'e1', text:'SUDS sustained ≥ 8 for >30 min during exposure → notify clinician', source:'session-notes' },
    { id:'e2', text:'Two consecutive nights <4h sleep → notify clinician', source:'session-notes' },
    { id:'e3', text:'Any SI ideation → immediate handoff to crisis protocol', source:'standing' },
  ],
  ai: {
    level: 'guided',
    crisisGuidance: false,  // hands off to human
    rationale: 'Chen has shown benefit from in-the-moment grounding guidance. Standing instruction: AI may NOT initiate trauma processing or attempt crisis de-escalation — human handoff only.',
  },
};

function UploadStep({ notes, setNotes, onGenerate, thinking }) {
  return (
    <div style={{ display:'grid', gridTemplateColumns:'1.4fr 1fr', gap:16 }}>
      <Card title="Session notes" right={<Pill>{I.edit(11)} editable</Pill>}>
        <textarea value={notes} onChange={e => setNotes(e.target.value)}
          style={{
            width:'100%', minHeight:380, border:`.5px solid ${C.border}`, borderRadius:8,
            padding:12, fontSize:12.5, fontFamily:C.mono, lineHeight:1.55, color:C.fg,
            resize:'vertical', outline:'none',
          }} />
        <div style={{ display:'flex', alignItems:'center', gap:8, marginTop:10 }}>
          <button style={{
            padding:'6px 10px', fontSize:11.5, borderRadius:6,
            border:`.5px solid ${C.border}`, background:'#fff', color:C.fg, cursor:'pointer',
            display:'inline-flex', alignItems:'center', gap:6,
          }}>{I.upload(12)} Upload .docx / paste from EHR</button>
          <span style={{ fontSize:11, color:C.faint }}>or transcribe a recording (3 sources connected)</span>
        </div>
      </Card>

      <Card title="What the draft will produce" right={<Pill tone="accent">{I.sparkles(11)} AI</Pill>}>
        <div style={{ fontSize:12.5, color:C.muted, lineHeight:1.6, marginBottom:14 }}>
          Tend extracts a structured prescription from your notes:
        </div>
        <ChecklistItem text="Discrete tasks (exposures, thought records)" />
        <ChecklistItem text="Continuous behaviors (sleep window, caffeine cut-off)" />
        <ChecklistItem text="Constraints (no alcohol while titrating)" />
        <ChecklistItem text="Escalation thresholds (when to ping you)" />
        <ChecklistItem text="AI assistance level — what Maya may guide on, and where she hands off" />
        <div style={{ marginTop:12, padding:'10px 12px', background:'#f8fafc', borderRadius:7, border:`.5px solid ${C.border}`, fontSize:11.5, color:C.muted, display:'flex', gap:8 }}>
          {I.shield(13)}
          <div>You will edit every field before signing. Tend never sends a prescription Chen-side without your approval.</div>
        </div>
        <button onClick={onGenerate} disabled={thinking} style={{
          marginTop:14, width:'100%', height:38, borderRadius:8, fontSize:13, fontWeight:600,
          background: thinking ? '#cbd5e1' : C.accent, color:'#fff', border:0, cursor: thinking?'wait':'pointer',
          display:'inline-flex', alignItems:'center', justifyContent:'center', gap:8,
        }}>
          {thinking ? <><Spinner /> Reading session notes…</> : <>{I.sparkles(13)} Draft prescription</>}
        </button>
      </Card>
    </div>
  );
}

function Spinner() {
  return (
    <div style={{
      width:14, height:14, borderRadius:'50%',
      border:'2px solid rgba(255,255,255,.4)', borderTopColor:'#fff',
      animation:'tend-spin 0.7s linear infinite',
    }}>
      <style>{`@keyframes tend-spin{to{transform:rotate(360deg)}}`}</style>
    </div>
  );
}

function ChecklistItem({ text }) {
  return (
    <div style={{ display:'flex', alignItems:'center', gap:8, padding:'4px 0', fontSize:12.5 }}>
      <div style={{ width:14, height:14, borderRadius:4, background:C.accentSoft, color:C.accent, display:'flex', alignItems:'center', justifyContent:'center' }}>{I.check(10)}</div>
      {text}
    </div>
  );
}

function DraftStep({ draft, setDraft, onBack, onNext }) {
  const updateTask = (i, patch) => {
    setDraft({ ...draft, tasks: draft.tasks.map((t, j) => j===i ? {...t, ...patch} : t) });
  };
  const removeTask = (i) => setDraft({ ...draft, tasks: draft.tasks.filter((_, j) => j !== i) });

  return (
    <div style={{ display:'grid', gridTemplateColumns:'1.4fr 1fr', gap:16 }}>
      <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
        <Card title="Prescribed work" right={<button style={ghostBtn}>{I.plus(12)} Add task</button>}>
          {draft.tasks.map((t, i) => (
            <div key={t.id} style={{ padding:'12px 0', borderBottom:`.5px solid ${C.border}` }}>
              <div style={{ display:'flex', gap:10, alignItems:'flex-start' }}>
                <TaskIcon type={t.type} />
                <div style={{ flex:1 }}>
                  <input value={t.title} onChange={e => updateTask(i, { title: e.target.value })}
                    style={editInput} />
                  <div style={{ display:'flex', gap:8, marginTop:6, flexWrap:'wrap' }}>
                    <input value={t.cadence} onChange={e => updateTask(i, { cadence: e.target.value })}
                      style={{ ...editInput, width:120, fontSize:11.5 }} />
                    <input value={t.duration} onChange={e => updateTask(i, { duration: e.target.value })}
                      style={{ ...editInput, width:90, fontSize:11.5 }} />
                    <Pill tone="accent" style={{ marginLeft:'auto' }}>{I.sparkles(10)} from notes</Pill>
                  </div>
                  <textarea value={t.detail} onChange={e => updateTask(i, { detail: e.target.value })}
                    style={{ ...editInput, marginTop:6, minHeight:42, fontSize:12 }} />
                </div>
                <button onClick={() => removeTask(i)} style={{
                  background:'none', border:0, color:C.faint, cursor:'pointer', fontSize:14, padding:4,
                }}>×</button>
              </div>
            </div>
          ))}
        </Card>

        <Card title="Constraints">
          {draft.constraints.map((c, i) => (
            <div key={c.id} style={{ display:'flex', alignItems:'center', gap:10, padding:'7px 0' }}>
              {I.lock(13)}
              <input value={c.text} onChange={e => setDraft({ ...draft, constraints: draft.constraints.map((x, j) => j===i?{...x, text:e.target.value}:x) })} style={{ ...editInput, flex:1 }} />
              <Pill tone={c.source==='standing'?'neutral':'accent'}>{c.source==='standing'?'standing':'from notes'}</Pill>
            </div>
          ))}
        </Card>

        <Card title="Escalation thresholds" right={<Pill tone="bad">Auto-notify Maya</Pill>}>
          {draft.escalation.map((e, i) => (
            <div key={e.id} style={{ display:'flex', alignItems:'center', gap:10, padding:'7px 0' }}>
              <span style={{ color:C.bad }}>{I.dot()}</span>
              <input value={e.text} onChange={ev => setDraft({ ...draft, escalation: draft.escalation.map((x, j) => j===i?{...x, text:ev.target.value}:x) })} style={{ ...editInput, flex:1 }} />
              <Pill tone={e.source==='standing'?'neutral':'accent'}>{e.source==='standing'?'standing':'from notes'}</Pill>
            </div>
          ))}
        </Card>
      </div>

      <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
        <Card title="AI assistance" right={<Pill tone="accent">{I.sparkles(11)} draft</Pill>}>
          <div style={{ fontSize:11.5, color:C.faint, fontWeight:500, letterSpacing:'.04em', marginBottom:6 }}>LEVEL</div>
          <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:6, marginBottom:12 }}>
            {[
              ['off','Off'],['minimal','Minimal'],['guided','Guided'],['full','Full'],
            ].map(([k, label]) => (
              <button key={k} onClick={() => setDraft({...draft, ai:{...draft.ai, level:k}})} style={{
                padding:'8px 6px', fontSize:11, borderRadius:6,
                border:`.5px solid ${draft.ai.level===k ? C.accent : C.border}`,
                background: draft.ai.level===k ? C.accentSoft : '#fff',
                color: draft.ai.level===k ? C.accent : C.fg,
                fontWeight: draft.ai.level===k ? 600 : 500, cursor:'pointer',
              }}>{label}</button>
            ))}
          </div>
          <div style={{ display:'flex', alignItems:'flex-start', gap:10, padding:'10px 0', borderTop:`.5px solid ${C.border}` }}>
            <input type="checkbox" checked={draft.ai.crisisGuidance} onChange={e => setDraft({...draft, ai:{...draft.ai, crisisGuidance:e.target.checked}})} style={{ marginTop:2 }} />
            <div>
              <div style={{ fontSize:12.5, fontWeight:500 }}>Allow Maya to guide through crisis</div>
              <div style={{ fontSize:11.5, color:C.muted, marginTop:2, lineHeight:1.5 }}>
                Off (recommended for Chen): AI hands off to human protocol on any SI mention.
              </div>
            </div>
          </div>
          <div style={{ marginTop:8, fontSize:11.5, color:C.muted, lineHeight:1.55, padding:'10px 12px', background:'#f8fafc', borderRadius:7 }}>
            <b style={{ color:C.fg }}>Rationale (from notes):</b> {draft.ai.rationale}
          </div>
        </Card>

        <Card title="Diff vs. last prescription" right={<Pill>v3 → v4</Pill>}>
          <Diff op="+" text="In-vivo café scaled to late afternoon" />
          <Diff op="~" text="Sleep — phone out of room (added)" />
          <Diff op="+" text="Caffeine cut-off 14:00" />
          <Diff op="=" text="Imaginal exposure unchanged" muted />
          <Diff op="=" text="Morning log unchanged" muted />
        </Card>

        <div style={{ display:'flex', gap:8 }}>
          <button onClick={onBack} style={{ ...ghostBtn, flex:1, height:36 }}>Back</button>
          <button onClick={onNext} style={{
            flex:2, height:36, borderRadius:7, fontSize:13, fontWeight:600,
            background:C.accent, color:'#fff', border:0, cursor:'pointer',
            display:'inline-flex', alignItems:'center', justifyContent:'center', gap:6,
          }}>Review & approve {I.arrowR(13)}</button>
        </div>
      </div>
    </div>
  );
}

function Diff({ op, text, muted }) {
  const c = op==='+'?C.ok : op==='~'?'#b45309' : op==='-'?C.bad : C.faint;
  return (
    <div style={{ display:'flex', gap:10, padding:'5px 0', alignItems:'center' }}>
      <span style={{ fontFamily:C.mono, fontWeight:700, color:c, width:14, textAlign:'center' }}>{op}</span>
      <span style={{ fontSize:12.5, color: muted ? C.faint : C.fg }}>{text}</span>
    </div>
  );
}

function ApproveStep({ draft, onBack, onApprove }) {
  const [signed, setSigned] = React.useState(false);
  return (
    <div style={{ display:'grid', gridTemplateColumns:'1.4fr 1fr', gap:16 }}>
      <Card title="Final prescription · v4 (pending)">
        <div style={{ fontSize:13, color:C.muted, marginBottom:12 }}>

}

<script type="text/babel" data-presets="env,react">
// patient.jsx — Tend patient mobile app
// Aesthetic: warm, journal-like. Cream background, soft sage accent,
// serif for moments that feel personal (Maya's voice, prompts), sans for UI.

const P = {
  font: '"Inter", system-ui, -apple-system, sans-serif',
  serif: '"Instrument Serif", "Iowan Old Style", Georgia, serif',
  mono: '"JetBrains Mono", ui-monospace, monospace',
  // Warm cream palette
  bg: '#f6f1e8',
  panel: '#fbf7ef',
  panelEdge: 'rgba(74, 53, 30, 0.08)',
  panelEdgeStrong: 'rgba(74, 53, 30, 0.16)',
  fg: '#2a221b',
  muted: '#6b5b4a',
  faint: '#a89580',
  // Soft sage accent (Maya)
  sage: '#5a7a5e',
  sageSoft: '#e3ebe1',
  sageMid: '#a8bca7',
  // Warm secondary
  amber: '#a86b3c',
  amberSoft: '#f4e6d3',
  // Status
  ok: '#5a7a5e',
  warn: '#a86b3c',
  bad: '#9f3a3a',
};

// ─── primitives ───
function PPill({ tone='neutral', children, style }) {
  const palettes = {
    neutral:{ bg:'#efe7d8', fg:'#5b4a36', bd:'rgba(74,53,30,.08)' },
    sage:{ bg:P.sageSoft, fg:P.sage, bd:'rgba(90,122,94,.18)' },
    amber:{ bg:P.amberSoft, fg:P.amber, bd:'rgba(168,107,60,.2)' },
    bad:{ bg:'#f7dcdc', fg:P.bad, bd:'rgba(159,58,58,.18)' },
  };
  const p = palettes[tone] || palettes.neutral;
  return (
    <span style={{
      display:'inline-flex', alignItems:'center', gap:5,
      padding:'2px 8px', borderRadius:999, fontSize:11, fontWeight:500,
      background:p.bg, color:p.fg, border:`.5px solid ${p.bd}`,
      whiteSpace:'nowrap', ...style,
    }}>{children}</span>
  );
}

const PI = {
  back:(s=18)=> <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M15 6l-6 6 6 6"/></svg>,
  send:(s=18)=> <svg width={s} height={s} viewBox="0 0 24 24" fill="currentColor"><path d="M3 11.5l18-8-7 18-2.5-7.5L3 11.5z"/></svg>,
  more:(s=18)=> <svg width={s} height={s} viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/></svg>,
  close:(s=18)=> <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M6 6l12 12M18 6L6 18"/></svg>,
  check:(s=14)=> <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4"><path d="M5 12l5 5 9-11"/></svg>,
  share:(s=14)=> <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M12 3v12M7 8l5-5 5 5M5 21h14"/></svg>,
  lock:(s=14)=> <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>,
  bell:(s=18)=> <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10 21a2 2 0 0 0 4 0"/></svg>,
  dot:(s=8)=> <svg width={s} height={s} viewBox="0 0 24 24"><circle cx="12" cy="12" r="6" fill="currentColor"/></svg>,
  spark:(s=14)=> <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M12 4l1.8 4.5L18 10l-4.2 1.5L12 16l-1.8-4.5L6 10l4.2-1.5L12 4z"/></svg>,
  arrow:(s=14)=> <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 12h14M13 5l7 7-7 7"/></svg>,
  plus:(s=18)=> <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M12 5v14M5 12h14"/></svg>,
};

// ─── shell ───
function PatientApp() {
  const [route, setRoute] = React.useState('home');
  // home | chat | prescriptions | adherence | profile | shares | shareOne | settings | notifications | requestApprove
  const [pendingShare, setPendingShare] = React.useState(0);

  const adherenceMode = window.__TEND_ADHERENCE || 'real';

  const go = setRoute;

  return (
    <div style={{
      width:'100%', height:'100%',
      background:P.bg, color:P.fg,
      font:`14px/1.5 ${P.font}`,
      display:'flex', flexDirection:'column',
      overflow:'hidden', position:'relative',
    }}>
      <PStatusBar />
      <div style={{ flex:1, display:'flex', flexDirection:'column', minHeight:0, position:'relative' }}>
        {route === 'home' && <PHome go={go} adherenceMode={adherenceMode} />}
        {route === 'chat' && <PChat go={go} setPendingShare={setPendingShare} />}
        {route === 'prescriptions' && <PPrescriptions go={go} />}
        {route === 'adherence' && <PAdherence go={go} adherenceMode={adherenceMode} />}
        {route === 'profile' && <PProfile go={go} />}
        {route === 'shares' && <PShares go={go} />}
        {route === 'shareOne' && <PShareReview go={go} idx={pendingShare} />}
        {route === 'settings' && <PSettings go={go} />}
        {route === 'notifications' && <PNotifications go={go} />}
        {route === 'requestApprove' && <PRequestApprove go={go} />}
      </div>
      {!['chat','shareOne','requestApprove'].includes(route) && (
        <PTabBar route={route} go={go} />

    </div>
  );
}

function PStatusBar() {
  return (
    <div style={{
      height:32, padding:'0 18px', display:'flex', alignItems:'center', justifyContent:'space-between',
      fontSize:12, fontWeight:600, color:P.fg, flexShrink:0, fontVariantNumeric:'tabular-nums',
    }}>
      <span>9:41</span>
      <div style={{ display:'flex', gap:6, alignItems:'center', opacity:.85 }}>
        <svg width="16" height="10" viewBox="0 0 16 10"><path d="M0 9h2V7H0v2zm3 0h2V5H3v4zm3 0h2V3H6v6zm3 0h2V1H9v8zm3 0h2v-7h-2v7z" fill="currentColor"/></svg>
        <svg width="14" height="10" viewBox="0 0 14 10" fill="none" stroke="currentColor" strokeWidth="1"><path d="M1 4a8 8 0 0 1 12 0M3 6a5 5 0 0 1 8 0M5 8a2 2 0 0 1 4 0"/></svg>
        <svg width="22" height="10" viewBox="0 0 22 10"><rect x="0" y="1" width="18" height="8" rx="2" fill="none" stroke="currentColor" strokeWidth=".8"/><rect x="2" y="3" width="13" height="4" rx="1" fill="currentColor"/><rect x="19" y="3.5" width="1.5" height="3" fill="currentColor"/></svg>
      </div>
    </div>
  );
}

function PTabBar({ route, go }) {
  const tabs = [
    { id:'home',  label:'Today',  icon: home => <svg width="18" height="18" viewBox="0 0 24 24" fill={home?'currentColor':'none'} stroke="currentColor" strokeWidth="1.6"><path d="M4 11l8-7 8 7v9a1 1 0 0 1-1 1h-5v-7H10v7H5a1 1 0 0 1-1-1v-9z"/></svg> },
    { id:'chat',  label:'Maya',   icon: home => <svg width="18" height="18" viewBox="0 0 24 24" fill={home?'currentColor':'none'} stroke="currentColor" strokeWidth="1.6"><path d="M4 6a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-7l-4 4v-4H6a2 2 0 0 1-2-2V6z"/></svg> },
    { id:'prescriptions', label:'Plan', icon: home => <svg width="18" height="18" viewBox="0 0 24 24" fill={home?'currentColor':'none'} stroke="currentColor" strokeWidth="1.6"><rect x="5" y="3" width="14" height="18" rx="2"/><path d="M9 8h6M9 12h6M9 16h4"/></svg> },
    { id:'profile', label:'You',  icon: home => <svg width="18" height="18" viewBox="0 0 24 24" fill={home?'currentColor':'none'} stroke="currentColor" strokeWidth="1.6"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg> },
  ];
  return (
    <div style={{
      flexShrink:0, padding:'8px 16px 14px',
      borderTop:`.5px solid ${P.panelEdge}`,
      background:P.bg,
      display:'flex', justifyContent:'space-around', alignItems:'center',
    }}>
      {tabs.map(t => {
        const active = route === t.id || (t.id==='prescriptions' && route==='adherence');
        return (
          <button key={t.id} onClick={() => go(t.id)} style={{
            background:'transparent', border:0, cursor:'pointer',
            display:'flex', flexDirection:'column', alignItems:'center', gap:3,
            color: active ? P.sage : P.faint,
            padding:'4px 10px',
          }}>
            {t.icon(active)}
            <span style={{ fontSize:10, fontWeight: active ? 600 : 500 }}>{t.label}</span>
          </button>
        );
      })}
    </div>
  );
}

// ─── HOME ───
function PHome({ go, adherenceMode }) {
  const greeting = 'Good morning, Chen.';
  const onTrack = adherenceMode === 'on';
  const offTrack = adherenceMode === 'off';

  // Today's prescribed items
  const today = [
    { id:'morning', title:'Morning grounding', dur:'5 min', state: offTrack ? 'pending' : 'done', type:'continuous' },
    { id:'imag', title:'Imaginal exposure', dur:'30 min', state: offTrack ? 'pending' : 'pending', when:'flexible', type:'exposure' },
    { id:'cafe', title:'Café Albert · late afternoon', dur:'20 min', state:'pending', when:'17:00', type:'exposure' },
  ];

  return (
    <div style={{ flex:1, overflow:'auto', padding:'8px 20px 20px', position:'relative' }}>

      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'8px 0 18px' }}>
        <div>
          <div style={{ fontSize:11.5, color:P.faint, fontWeight:500, letterSpacing:'.04em', textTransform:'uppercase' }}>Sun · May 3</div>

            {greeting}
