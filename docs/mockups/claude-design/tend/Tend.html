  html, body {

  .anno-pin {

    position: absolute;
    background: #1c1917;
    color: #fafaf9;
    padding: 8px 11px;
    border-radius: 6px;
    font-size: 11px;
    line-height: 1.4;

    z-index: 101;
    pointer-events: none;
    box-shadow: 0 8px 24px rgba(0,0,0,.3);

  }
  .anno-hidden .anno-pin { display: none; }
