name: Deploy Tend mockup to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/mockups/claude-design/tend/**'
      - '.github/workflows/deploy-mockup.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/mockups/claude-design/tend
      - id: deployment
        uses: actions/deploy-pages@v4
